<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=yes">
    <title>রাহবার স্মার্ট রিডার</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        :root { --primary: #1a472a; --accent: #27ae60; --danger: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #222; color: white; height: 100vh; overflow: hidden; }
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; }
        .top-toolbar { background: var(--primary); padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 300px; background: #1e1e1e; transform: translateX(-100%); transition: .3s; padding: 20px; overflow-y: auto; z-index: 999; border-right: 1px solid #333; }
        .sidebar.active { transform: translateX(0); }
        .sidebar-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .filter-box { margin-bottom: 15px; }
        .filter-box select { width: 100%; padding: 8px; border-radius: 5px; background: #333; color: white; border: 1px solid #444; }
        .book-item { display: flex; align-items: center; background: #2a2a2a; padding: 10px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
        .handle { cursor: move; margin-right: 12px; color: #888; font-size: 18px; padding: 5px; }
        .book-name { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .book-cat { font-size: 11px; color: var(--accent); margin-top: 2px; }
        .cat-btn { color: #f1c40f; cursor: pointer; margin-right: 15px; font-size: 18px; }
        .delete-btn { color: var(--danger); cursor: pointer; font-size: 18px; }
        
        /* উন্নত রিডার এরিয়া */
        .reader-area { 
            flex: 1; 
            overflow: auto; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            background: #333; 
            position: relative; 
            touch-action: none;
            padding: 20px 0;
        }
        
        #pdf-viewer { 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px;
            transform-origin: center top;
            transition: transform 0.1s ease-out;
        }
        
        .canvas-container { 
            position: relative; 
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border-radius: 3px;
            overflow: hidden;
        }
        
        canvas { 
            display: block; 
            max-width: 100%;
            width: 100%;
            height: auto;
        }
        
        .drawing-canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            pointer-events: none; 
        }
        
        .drawing-canvas.active { 
            pointer-events: auto; 
            cursor: crosshair; 
        }
        
        .bottom-controls { 
            background: rgba(0,0,0,0.9); 
            padding: 10px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            z-index: 100;
            flex-wrap: wrap;
            gap: 5px;
        }
        
        .btn { 
            background: none; 
            border: none; 
            color: white; 
            font-size: 20px; 
            cursor: pointer; 
            padding: 5px 10px;
            transition: color 0.2s;
        }
        
        .btn:hover { color: var(--accent); }
        .btn.active { color: #f1c40f; }
        
        .page-input-container { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            background: #333; 
            padding: 2px 8px; 
            border-radius: 5px; 
            border: 1px solid #555; 
        }
        
        #page-num-input { 
            background: transparent; 
            border: none; 
            color: var(--accent); 
            width: 40px; 
            text-align: center; 
            font-family: monospace; 
            font-weight: bold; 
            font-size: 16px; 
            outline: none; 
        }
        
        #total-pages { 
            font-family: monospace; 
            font-size: 14px; 
            color: #ccc; 
        }

        /* কালার প্যালেট */
        .color-palette { 
            display: none; 
            position: fixed; 
            bottom: 70px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0,0,0,0.9); 
            padding: 10px; 
            border-radius: 20px; 
            gap: 10px; 
            z-index: 101;
            border: 2px solid var(--accent);
        }
        
        .color-palette.active { 
            display: flex; 
        }
        
        .color-circle { 
            width: 25px; 
            height: 25px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid white;
            transition: transform 0.2s;
        }
        
        .color-circle:hover { transform: scale(1.1); }

        /* স্ক্রল মোড ইন্ডিকেটর */
        .mode-indicator {
            position: fixed;
            top: 70px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            color: var(--accent);
            z-index: 50;
        }

        /* অটো-স্ক্রল কন্ট্রোল প্যানেল */
        .auto-scroll-panel {
            display: none;
            position: fixed;
            bottom: 70px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--accent);
            z-index: 101;
            min-width: 200px;
        }

        .auto-scroll-panel.active {
            display: block;
        }

        .auto-scroll-panel label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            color: #ccc;
        }

        .auto-scroll-panel input[type="range"] {
            width: 100%;
            margin-bottom: 10px;
        }

        .speed-display {
            text-align: center;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .auto-scroll-panel button {
            width: 100%;
            padding: 8px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .auto-scroll-panel button:hover {
            background: #1f8a4d;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>📚 কিতাব লিস্ট</h3>
            <button class="btn" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <div class="filter-box">
            <select id="category-filter" onchange="changeFilter()">
                <option value="all">সব কিতাব</option>
            </select>
        </div>
        <div id="book-list"></div>
        <label style="display:block; background:var(--accent); padding:12px; text-align:center; border-radius:8px; margin-top:15px; cursor:pointer; font-weight:bold;">
            <i class="fas fa-plus-circle"></i> নতুন কিতাব যোগ করুন
            <input type="file" id="file-input" accept="application/pdf" style="display:none">
        </label>
    </div>

    <div class="top-toolbar">
        <button class="btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <div>
            <button class="btn" onclick="zoomOut()" title="জুম আউট"><i class="fas fa-search-minus"></i></button>
            <button class="btn" onclick="resetZoom()" title="স্বাভাবিক আকার"><span style="font-size: 14px;">100%</span></button>
            <button class="btn" onclick="zoomIn()" title="জুম ইন"><i class="fas fa-search-plus"></i></button>
        </div>
        <button class="btn" onclick="location.href='index.html'"><i class="fas fa-home"></i></button>
    </div>

    <div class="mode-indicator" id="mode-indicator" style="display:none;"></div>

    <div class="reader-area" id="reader-container" onclick="closeSidebarIfOpen(event)">
        <div id="pdf-viewer">
            <p style="text-align:center; margin-top:40vh; color:#888;">একটি কিতাব নির্বাচন করুন</p>
        </div>
    </div>

    <div class="color-palette" id="color-palette">
        <div class="color-circle" style="background: red;" onclick="setPenColor('red')" title="লাল"></div>
        <div class="color-circle" style="background: blue;" onclick="setPenColor('blue')" title="নীল"></div>
        <div class="color-circle" style="background: green;" onclick="setPenColor('green')" title="সবুজ"></div>
        <div class="color-circle" style="background: yellow;" onclick="setPenColor('yellow')" title="হলুদ"></div>
        <div class="color-circle" style="background: black;" onclick="setPenColor('black')" title="কালো"></div>
        <button class="btn" onclick="clearDrawing()" style="font-size: 14px; color: white;" title="ড্রয়িং মুছুন">🗑️</button>
    </div>

    <div class="auto-scroll-panel" id="auto-scroll-panel">
        <label>অটো-স্ক্রল গতি:</label>
        <input type="range" id="scroll-speed" min="1" max="10" value="5" onchange="updateScrollSpeed()">
        <div class="speed-display" id="speed-display">মধ্যম</div>
        <button onclick="startAutoScroll()">শুরু করুন</button>
        <button onclick="stopAutoScroll()" style="margin-top: 5px; background: #e74c3c;">থামান</button>
    </div>

    <div class="bottom-controls" id="navigation-bar" style="display:none">
        <button class="btn" onclick="goToFirstPage()" title="প্রথম পৃষ্ঠা"><i class="fas fa-angle-double-left"></i></button>
        <button class="btn" onclick="prevPage()" title="আগের পৃষ্ঠা"><i class="fas fa-chevron-left"></i></button>
        
        <div class="page-input-container">
            <input type="number" id="page-num-input" min="1" onkeypress="if(event.key === 'Enter') jumpToPage()" title="পৃষ্ঠা নাম্বার">
            <span id="total-pages">/ 0</span>
        </div>

        <button class="btn" onclick="nextPage()" title="পরের পৃষ্ঠা"><i class="fas fa-chevron-right"></i></button>
        <button class="btn" onclick="goToLastPage()" title="শেষ পৃষ্ঠা"><i class="fas fa-angle-double-right"></i></button>
        <button class="btn" onclick="togglePen()" id="pen-btn" title="পেন্সিল টুল"><i class="fas fa-pen"></i></button>
        <button class="btn" onclick="toggleAutoScrollPanel()" id="auto-scroll-btn" title="অটো-স্ক্রল"><i class="fas fa-play"></i></button>
        <button class="btn" onclick="toggleScrollMode()" id="scroll-btn" title="স্ক্রল মোড"><i class="fas fa-scroll"></i></button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null, pageNum = 1, scale = 1, isScrollMode = false, currentFileName = "";
    let isPenActive = false, penColor = 'red', isDrawing = false;
    let isPanning = false, panStartX = 0, panStartY = 0, panX = 0, panY = 0;
    let isAutoScrolling = false, autoScrollSpeed = 5, autoScrollInterval = null;
    let lastScrollPosition = 0;
    let isTouchPanning = false, touchStartX = 0, touchStartY = 0;
    
    const viewer = document.getElementById("pdf-viewer");
    const sidebar = document.getElementById("sidebar");
    const readerContainer = document.getElementById('reader-container');
    const modeIndicator = document.getElementById('mode-indicator');
    let db;

    const request = indexedDB.open("RahbarLibraryDB", 1);
    request.onupgradeneeded = e => e.target.result.createObjectStore("books");
    request.onsuccess = e => { db = e.target.result; updateBookList(); };

    function toggleSidebar() { sidebar.classList.toggle("active"); }
    function closeSidebarIfOpen(e) { if(sidebar.classList.contains("active") && !sidebar.contains(e.target)) sidebar.classList.remove("active"); }

    function getCategories() { return JSON.parse(localStorage.getItem("rahbar_categories") || "{}"); }
    function getCategory(name) { return getCategories()[name] || "সাধারণ"; }

    function setCategory(name) {
        let cat = prompt("ক্যাটাগরির নাম লিখুন:");
        if (cat) {
            let cats = getCategories();
            cats[name] = cat;
            localStorage.setItem("rahbar_categories", JSON.stringify(cats));
            updateBookList();
        }
    }

    function changeFilter() {
        localStorage.setItem("rahbar_filter", document.getElementById("category-filter").value);
        updateBookList();
    }

    function updateBookList() {
        const listDiv = document.getElementById("book-list");
        listDiv.innerHTML = "";
        const filter = localStorage.getItem("rahbar_filter") || "all";
        const tx = db.transaction("books", "readonly");

        tx.objectStore("books").getAllKeys().onsuccess = e => {
            let keys = e.target.result;
            let savedOrder = JSON.parse(localStorage.getItem('rahbar_order_v6') || '[]');
            keys.forEach(k => { if(!savedOrder.includes(k)) savedOrder.push(k); });
            savedOrder = savedOrder.filter(k => keys.includes(k));
            localStorage.setItem('rahbar_order_v6', JSON.stringify(savedOrder));

            const select = document.getElementById("category-filter");
            let uniqueCats = new Set();
            keys.forEach(name => uniqueCats.add(getCategory(name)));
            select.innerHTML = '<option value="all">সব কিতাব</option>';
            uniqueCats.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
            select.value = filter;

            savedOrder.forEach(name => {
                let cat = getCategory(name);
                if(filter !== "all" && cat !== filter) return;

                const item = document.createElement("div");
                item.className = "book-item";
                item.setAttribute('data-id', name);
                item.innerHTML = `
                    <div class="handle"><i class="fas fa-grip-lines"></i></div>
                    <div class="book-name">${name}<div class="book-cat">${cat}</div></div>
                    <div class="cat-btn" onclick="setCategory('${name}')"><i class="fas fa-folder-plus"></i></div>
                    <div class="delete-btn" onclick="deleteBook(event,'${name}')"><i class="fas fa-trash"></i></div>
                `;
                item.onclick = (e) => {
                    if(!e.target.closest('.cat-btn') && !e.target.closest('.delete-btn') && !e.target.closest('.handle')) {
                        loadPDFFromDB(name);
                    }
                };
                listDiv.appendChild(item);
            });

            new Sortable(listDiv, { handle: '.handle', animation: 200, onEnd: function() {
                const newOrder = Array.from(listDiv.querySelectorAll('.book-item')).map(el => el.getAttribute('data-id'));
                localStorage.setItem('rahbar_order_v6', JSON.stringify(newOrder));
            }});
        };
    }

    function loadPDFFromDB(name) {
        currentFileName = name; sidebar.classList.remove("active");
        stopAutoScroll();
        const tx = db.transaction("books", "readonly");
        tx.objectStore("books").get(name).onsuccess = e => initPDF(URL.createObjectURL(e.target.result));
    }

    async function initPDF(url) {
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        pageNum = parseInt(localStorage.getItem(currentFileName + "_page")) || 1;
        lastScrollPosition = parseInt(localStorage.getItem(currentFileName + "_scroll")) || 0;
        document.getElementById("navigation-bar").style.display = "flex";
        document.getElementById("total-pages").textContent = `/ ${pdfDoc.numPages}`;
        scale = 1;
        panX = 0;
        panY = 0;
        renderView();
    }

    function jumpToPage() {
        const input = document.getElementById("page-num-input");
        let val = parseInt(input.value);
        if(val >= 1 && val <= pdfDoc.numPages) {
            pageNum = val;
            renderView();
            readerContainer.scrollTop = 0;
        } else {
            alert("ভুল পৃষ্ঠা নাম্বার!");
            input.value = pageNum;
        }
    }

    async function renderView() {
        if(!pdfDoc) return;
        viewer.innerHTML = "";
        if(isScrollMode) {
            for(let i=1; i<=pdfDoc.numPages; i++) await renderPage(i);
            modeIndicator.style.display = 'none';
        } else {
            await renderPage(pageNum);
            document.getElementById("page-num-input").value = pageNum;
            modeIndicator.textContent = isScrollMode ? 'স্ক্রল মোড' : 'পৃষ্ঠা মোড';
            modeIndicator.style.display = 'block';
        }
        saveReadingProgress();
        updateZoom();
    }

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({scale: 2});
        
        const container = document.createElement("div");
        container.className = "canvas-container";
        container.style.width = (viewport.width / 2) + "px";
        container.style.height = (viewport.height / 2) + "px";

        const canvas = document.createElement("canvas");
        canvas.height = viewport.height; 
        canvas.width = viewport.width;
        canvas.style.width = "100%"; 
        canvas.style.height = "100%";
        
        const drawCanvas = document.createElement("canvas");
        drawCanvas.className = "drawing-canvas" + (isPenActive ? " active" : "");
        drawCanvas.width = viewport.width; 
        drawCanvas.height = viewport.height;
        drawCanvas.style.width = "100%"; 
        drawCanvas.style.height = "100%";

        container.appendChild(canvas);
        container.appendChild(drawCanvas);
        viewer.appendChild(container);

        await page.render({canvasContext: canvas.getContext("2d"), viewport: viewport}).promise;
        setupDrawing(drawCanvas);
    }

    // পেন্সিল ফিচার
    function togglePen() {
        isPenActive = !isPenActive;
        document.getElementById('pen-btn').classList.toggle('active');
        document.getElementById('color-palette').classList.toggle('active');
        document.querySelectorAll('.drawing-canvas').forEach(c => {
            c.classList.toggle('active', isPenActive);
        });
    }

    function setPenColor(color) { penColor = color; }

    function setupDrawing(canvas) {
        const ctx = canvas.getContext('2d');
        ctx.strokeStyle = penColor;
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';

        const startDraw = (e) => {
            if(!isPenActive) return;
            isDrawing = true;
            ctx.beginPath();
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ctx.moveTo(x * (canvas.width / rect.width), y * (canvas.height / rect.height));
        };

        const draw = (e) => {
            if(!isDrawing || !isPenActive) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ctx.lineTo(x * (canvas.width / rect.width), y * (canvas.height / rect.height));
            ctx.strokeStyle = penColor;
            ctx.stroke();
        };

        const stopDraw = () => isDrawing = false;

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDraw);
    }

    function clearDrawing() {
        document.querySelectorAll('.drawing-canvas').forEach(c => {
            c.getContext('2d').clearRect(0, 0, c.width, c.height);
        });
    }

    // উন্নত জুম ও প্যানিং ফিচার
    function updateZoom() {
        viewer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    function zoomIn() { 
        scale += 0.3; 
        if(scale > 5) scale = 5; 
        panX = 0;
        panY = 0;
        updateZoom(); 
    }

    function zoomOut() { 
        scale -= 0.3; 
        if(scale < 0.5) scale = 0.5; 
        panX = 0;
        panY = 0;
        updateZoom(); 
    }

    function resetZoom() { 
        scale = 1; 
        panX = 0;
        panY = 0;
        updateZoom(); 
    }

    // ডেস্কটপ প্যানিং (মাউস)
    readerContainer.addEventListener('mousedown', (e) => {
        if(scale > 1 && !isPenActive) {
            isPanning = true;
            panStartX = e.clientX - panX;
            panStartY = e.clientY - panY;
            readerContainer.style.cursor = 'grabbing';
        }
    });

    readerContainer.addEventListener('mousemove', (e) => {
        if(isPanning && scale > 1) {
            panX = e.clientX - panStartX;
            panY = e.clientY - panStartY;
            updateZoom();
        }
    });

    readerContainer.addEventListener('mouseup', () => {
        isPanning = false;
        readerContainer.style.cursor = 'default';
    });

    readerContainer.addEventListener('mouseleave', () => {
        isPanning = false;
        readerContainer.style.cursor = 'default';
    });

    // মোবাইল টাচ প্যানিং
    readerContainer.addEventListener('touchstart', (e) => {
        if(scale > 1 && !isPenActive && e.touches.length === 1) {
            isTouchPanning = true;
            touchStartX = e.touches[0].clientX - panX;
            touchStartY = e.touches[0].clientY - panY;
        }
    }, { passive: false });

    readerContainer.addEventListener('touchmove', (e) => {
        if(isTouchPanning && scale > 1 && e.touches.length === 1) {
            e.preventDefault();
            panX = e.touches[0].clientX - touchStartX;
            panY = e.touches[0].clientY - touchStartY;
            updateZoom();
        }
    }, { passive: false });

    readerContainer.addEventListener('touchend', (e) => {
        if(e.touches.length === 0) {
            isTouchPanning = false;
        }
    }, { passive: false });

    readerContainer.addEventListener('touchcancel', () => {
        isTouchPanning = false;
    }, { passive: false });

    // অটো-স্ক্রল ফিচার
    function toggleAutoScrollPanel() {
        document.getElementById('auto-scroll-panel').classList.toggle('active');
    }

    function updateScrollSpeed() {
        const speed = document.getElementById('scroll-speed').value;
        const speedTexts = ['খুব ধীর', 'ধীর', 'মধ্যম-ধীর', 'মধ্যম', 'মধ্যম-দ্রুত', 'দ্রুত', 'খুব দ্রুত', 'অত্যন্ত দ্রুত', 'বিদ্যুৎ গতি', 'সুপার দ্রুত'];
        document.getElementById('speed-display').textContent = speedTexts[speed - 1];
        autoScrollSpeed = speed;
    }

    function startAutoScroll() {
        if(isAutoScrolling) return;
        isAutoScrolling = true;
        document.getElementById('auto-scroll-btn').classList.add('active');
        
        autoScrollInterval = setInterval(() => {
            if(isScrollMode) {
                readerContainer.scrollTop += autoScrollSpeed * 2;
                if(readerContainer.scrollTop >= readerContainer.scrollHeight - readerContainer.clientHeight) {
                    stopAutoScroll();
                }
            } else {
                readerContainer.scrollTop += autoScrollSpeed * 2;
            }
            lastScrollPosition = readerContainer.scrollTop;
            saveReadingProgress();
        }, 100);
    }

    function stopAutoScroll() {
        if(!isAutoScrolling) return;
        isAutoScrolling = false;
        document.getElementById('auto-scroll-btn').classList.remove('active');
        if(autoScrollInterval) {
            clearInterval(autoScrollInterval);
            autoScrollInterval = null;
        }
    }

    // পড়ার অগ্রগতি সংরক্ষণ
    function saveReadingProgress() {
        if(currentFileName) {
            localStorage.setItem(currentFileName + "_page", pageNum);
            localStorage.setItem(currentFileName + "_scroll", readerContainer.scrollTop);
        }
    }

    // Hammer.js - Pinch to Zoom এবং Double Tap
    const hammer = new Hammer(readerContainer);
    hammer.get('pinch').set({ enable: true });

    let startScale = 1;
    hammer.on("pinchstart", () => { startScale = scale; });
    hammer.on("pinchmove", (e) => {
        if(isPenActive) return;
        scale = startScale * e.scale;
        if(scale < 0.5) scale = 0.5;
        if(scale > 5) scale = 5;
        panX = 0;
        panY = 0;
        updateZoom();
    });

    hammer.on("doubletap", () => { 
        if(isPenActive) return;
        scale = (scale > 1.2) ? 1 : 2; 
        panX = 0;
        panY = 0;
        updateZoom(); 
    });

    function nextPage() { if(pageNum < pdfDoc.numPages) { pageNum++; renderView(); readerContainer.scrollTop = 0; } }
    function prevPage() { if(pageNum > 1) { pageNum--; renderView(); readerContainer.scrollTop = 0; } }
    function goToFirstPage() { pageNum = 1; renderView(); }
    function goToLastPage() { pageNum = pdfDoc.numPages; renderView(); }
    
    function toggleScrollMode() { 
        isScrollMode = !isScrollMode; 
        document.getElementById('scroll-btn').style.color = isScrollMode ? 'var(--accent)' : 'white';
        renderView(); 
    }

    function deleteBook(e, name) {
        e.stopPropagation();
        if(confirm(`"${name}" মুছবেন?`)) {
            const tx = db.transaction("books", "readwrite");
            tx.objectStore("books").delete(name);
            localStorage.removeItem(name + "_page");
            localStorage.removeItem(name + "_scroll");
            tx.oncomplete = () => updateBookList();
        }
    }

    document.getElementById("file-input").addEventListener("change", e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function() {
            const blob = new Blob([new Uint8Array(this.result)], {type:'application/pdf'});
            const tx = db.transaction("books", "readwrite");
            tx.objectStore("books").put(blob, file.name);
            tx.oncomplete = () => { updateBookList(); loadPDFFromDB(file.name); };
        };
        reader.readAsArrayBuffer(file);
    });

    // পৃষ্ঠা ছেড়ে যাওয়ার সময় অগ্রগতি সংরক্ষণ
    window.addEventListener('beforeunload', saveReadingProgress);
</script>
</body>
</html>
