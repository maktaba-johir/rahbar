<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নাসিম হিজাজী সমগ্র - ২১টি বই একসাথে</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@600;800&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d3b66; /* নাসিম হিজাজীর জন্য একটু আলাদা থিম */
            --accent: #f4d35e;
            --silver: #ebebd3;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--silver);
            margin: 0; padding-bottom: 50px;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), #000);
            color: var(--accent);
            padding: 15px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            position: sticky; top: 0; z-index: 1000;
        }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* স্লাইডার সেকশন - সুন্দর ও গতিশীল */
        .slider-box {
            background: #000;
            border: 4px solid var(--accent);
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            position: relative;
            height: 450px; 
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .slider-box img {
            height: 100%; 
            width: auto;
            position: absolute;
            transition: all 1s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            opacity: 0;
            transform: translateX(120%) rotate(10deg) scale(0.8); 
        }

        .slider-box img.active {
            opacity: 1;
            transform: translateX(0) rotate(0deg) scale(1);
            z-index: 2;
        }

        .slider-box img.last {
            opacity: 0;
            transform: translateX(-120%) rotate(-10deg) scale(0.8);
            z-index: 1;
        }

        /* মেইন কার্ড */
        .main-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            border: 2px solid #000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .offer-badge {
            background: #d62828;
            color: white;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
            font-weight: 700;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        .price-section {
            background: #fff9c4;
            border: 2px dashed #f39c12;
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .price-section h3 { margin: 0; color: #d35400; font-size: 1.8rem; }

        .order-btn {
            display: block; background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #fff; padding: 18px; border-radius: 50px; text-decoration: none;
            font-size: 1.4rem; font-weight: 800; border: 3px solid #000;
            box-shadow: 0 8px 20px rgba(230, 126, 34, 0.3); transition: 0.3s;
        }

        /* লাইব্রেরি গ্যালারি - এক লাইনে ৫টি ছবি */
        .library-title {
            margin: 40px 0 15px; font-family: 'Baloo Da 2';
            color: var(--primary); font-size: 1.6rem; text-align: center;
        }
        .book-gallery {
            display: grid;
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px;
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            border: 3px solid var(--primary);
        }
        @media (max-width: 600px) {
            .book-gallery { grid-template-columns: repeat(3, 1fr); } 
        }
        
        .gallery-item {
            background: #fff;
            border: 1px solid #ddd;
            padding: 5px;
            border-radius: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.15); }
        .gallery-item img { width: 100%; border-radius: 4px; display: block; height: auto; }

    </style>
</head>
<body>

    <div class="header">
        <h1>নাসিম হিজাজী সমগ্র</h1>
    </div>

    <div class="container">
        
        <div class="slider-box" id="slider">
            <div id="loader" style="color: white; font-size: 1.2rem;">
                <i class="fas fa-spinner fa-spin"></i> ছবি আসছে...
            </div>
        </div>

        <div class="main-card">
            <div class="offer-badge">বিশেষ কালেকশন!</div>
            <h2 style="font-family:'Baloo Da 2'; color:var(--primary); margin-top:0;">২১টি কালজয়ী ঐতিহাসিক উপন্যাস</h2>
            
            <p style="margin-bottom: 15px; font-size: 1rem; color: #555;">নাসিম হিজাজীর সকল জনপ্রিয় বই এখন এক সাথে আপনার সংগ্রহে রাখুন।</p>

            <div class="price-section">
                <h3>প্যাকেজ মূল্য: ৫০ টাকা</h3>
                <p style="margin:5px 0 0; font-size:0.95rem; font-weight: bold; color: #2c3e50;">
                    (২১টি বইয়ের ডিজিটাল কপি আজীবন অ্যাক্সেস!)
                </p>
            </div>

            <a href="#" class="order-btn">
                <i class="fas fa-shopping-cart"></i> পুরো প্যাকেজটি কিনুন (৫০৳)
            </a>
        </div>

        <h3 class="library-title"><i class="fas fa-book-reader"></i> নাসিম হিজাজী লাইব্রেরি</h3>
        <div class="book-gallery" id="gallery"></div>

    </div>

    <script>
        // আপনার দেওয়া নতুন ডাইরেক্ট লিঙ্ক পাথ
        const archiveID = "nasim_hijaji";
        const folder = "book-nasim_hizazi";
        const total = 21; // আপনি ২১টি বই বলেছেন

        const slider = document.getElementById('slider');
        const gallery = document.getElementById('gallery');
        const loader = document.getElementById('loader');

        for (let i = 1; i <= total; i++) {
            const url = `https://archive.org/download/${archiveID}/${folder}/${i}.jpg`;

            // স্লাইডারের ছবি
            const img = document.createElement('img');
            img.src = url;
            if (i === 1) img.classList.add('active');
            img.onload = () => { if(loader) loader.style.display = 'none'; };
            img.onerror = function() { this.src = 'https://via.placeholder.com/300x450?text=Error'; };
            slider.appendChild(img);

            // গ্যালারির ছবি
            const gItem = document.createElement('div');
            gItem.classList.add('gallery-item');
            gItem.innerHTML = `<img src="${url}" alt="বই ${i}" onerror="this.src='https://via.placeholder.com/150x200?text=Error'">`;
            gallery.appendChild(gItem);
        }

        let current = 0;
        function autoSlide() {
            const images = slider.querySelectorAll('img');
            if (images.length < 2) return;

            images[current].classList.remove('active');
            images[current].classList.add('last');

            let oldIdx = current;
            current = (current + 1) % images.length;

            images[current].classList.remove('last');
            images[current].classList.add('active');

            setTimeout(() => {
                images[oldIdx].classList.remove('last');
            }, 1000);
        }

        setInterval(autoSlide, 3500); // ৩.৫ সেকেন্ড পর পর স্লাইড হবে
    </script>
</body>
</html>
