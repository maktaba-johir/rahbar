    <title>উলূমুল আরবীয়া ও দ্বীনিয়া: ৩০টি বিষয় পরিচিতি</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a5276;
            --accent-color: #27ae60;
            --bg-color: #f0f3f4;
            --text-color: #2c3e50;
            --white: #ffffff;
        }

        body {
            font-family: 'SolaimanLipi', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-section {
            text-align: center;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .home-btn {
            display: inline-block;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .home-btn:hover { color: var(--accent-color); }

        h1 {
            color: var(--primary-color);
            margin: 0;
            font-size: 24px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        /* Accordion Style */
        .subject-card {
            background: var(--white);
            margin-bottom: 10px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .subject-header {
            padding: 15px 20px;
            background: var(--primary-color);
            color: var(--white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .subject-header:hover { background: #154360; }

        .subject-title { font-size: 18px; font-weight: bold; }

        .subject-content {
            display: none;
            padding: 20px;
            border-top: 1px solid #ddd;
        }

        .arabic-text {
            display: block;
            font-size: 22px;
            color: #2980b9;
            text-align: right;
            direction: rtl;
            margin-bottom: 15px;
            font-family: 'Traditional Arabic', serif;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 5px;
        }

        .info-row { margin-bottom: 12px; }

        .label {
            font-weight: bold;
            color: var(--accent-color);
            display: inline-block;
            width: 150px;
        }

        .book-list {
            background: #eef7ee;
            padding: 10px;
            border-left: 4px solid var(--accent-color);
            margin-top: 10px;
        }

        /* Active class for JS */
        .active .subject-content { display: block; }
        .active .fa-chevron-down { transform: rotate(180deg); }

        @media (max-width: 600px) {
            .label { display: block; width: 100%; margin-bottom: 5px; }
        }

</head>
